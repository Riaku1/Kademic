<!-- Edit this file to change the layout of each record in the table view -->
<!-- To disable clicking of a field, remove the  and  formatters around it-->

<!-- If you wish to hide the table view header that contains the column titles, -->
<!-- add the following to the class_notes_init() hook (in hooks/class_notes.php file) -->
<!--     $options->ShowTableHeader = 0;     -->

		<td id="class_notes-subject-<%%VALUE(id)%%>" class="class_notes-subject"><%%VALUE(subject)%%></td>
		<td id="class_notes-class-<%%VALUE(id)%%>" class="class_notes-class"><%%VALUE(class)%%></td>
		<td id="class_notes-term-<%%VALUE(id)%%>" class="class_notes-term"><%%VALUE(term)%%></td>
		<td id="class_notes-topics-<%%VALUE(id)%%>" class="class_notes-topics"><%%VALUE(topics)%%></td>
		<td id="class_notes-resource-<%%VALUE(id)%%>" class="class_notes-resource"><a href="link.php?t=class_notes&f=resource&i=<%%VALUE(id)%%>" target="_blank" title="<%%VALUE(resource)%%>" class="btn btn-default"><i class="glyphicon glyphicon-lg glyphicon-download-alt text-info"></i></a></td>
		<script>$j(function() {
			var e_resource = '<%%VALUE(resource)%%>'; if(e_resource == '' || e_resource == '&nbsp;') $j(/*<*/ '#class_notes-resource-<%%VALUE(id)%%>' /*>*/).html('');
		});</script>
