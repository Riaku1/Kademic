<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Class -->
		<div class="form-group exams-class" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Class</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="class<%%RND1%%>"><%%COMBOTEXT(class)%%></span></div>
			</div>
		</div>
		<!-- Field: Total marks -->
		<div class="form-group exams-total_marks" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Total marks</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(total_marks)%%></div>
			</div>
		</div>
		<!-- Field: Teacher -->
		<div class="form-group exams-teacher" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Teacher</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(teacher)%%></div>
			</div>
		</div>
		<!-- Field: Subject -->
		<div class="form-group exams-subject" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Subject</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="subject<%%RND1%%>"><%%COMBOTEXT(subject)%%></span></div>
			</div>
		</div>
		<!-- Field: Avg performance -->
		<div class="form-group exams-avg_performance" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Avg performance</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(avg_performance)%%></div>
			</div>
		</div>
		<!-- Field: Highest mark -->
		<div class="form-group exams-highest_mark" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Highest mark</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(highest_mark)%%></div>
			</div>
		</div>
		<!-- Field: Lowest mark -->
		<div class="form-group exams-lowest_mark" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Lowest mark</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(lowest_mark)%%></div>
			</div>
		</div>
		<!-- Field: Date -->
		<div class="form-group exams-date" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(date)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
<!-- child records -->
<div class="panel-body">
	<div id="exams-children"></div>
</div>

<script>
	$j(function() {
		/* prevent loading child records in multiple DVP */
		if($j('[id=exams-children]').length > 1) return;

		post(
			'parent-children.php', {
				ParentTable: 'exams',
				SelectedID: '<%%VALUE(exm_id)%%>',
				Operation: 'show-children-printable'
			},
			'exams-children',
			'disable-element',
			'loading-element',
			apply_persisting_children
		);

		$j('form').on('click', '#children-tabs button[data-target]', function() {
			$j(this).toggleClass('active');
			persist_expanded_child($j(this).attr('id'));
		});
	})
</script>
