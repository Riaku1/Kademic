<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: StID -->
		<div class="form-group enrollment-stid" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">StID</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(stid)%%></div>
			</div>
		</div>
		<!-- Field: Full name -->
		<div class="form-group enrollment-full_name" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Full name</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="full_name<%%RND1%%>"><%%COMBOTEXT(full_name)%%></span></div>
			</div>
		</div>
		<!-- Field: Class -->
		<div class="form-group enrollment-class" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Class</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="class<%%RND1%%>"><%%COMBOTEXT(class)%%></span></div>
			</div>
		</div>
		<!-- Field: Year -->
		<div class="form-group enrollment-year" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Year</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="year<%%RND1%%>"></span></div>
			</div>
		</div>
		<!-- Field: Term -->
		<div class="form-group enrollment-term" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Term</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(term)%%></div>
			</div>
		</div>
		<!-- Field: Total fees -->
		<div class="form-group enrollment-total_fees" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Total fees</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(total_fees)%%></div>
			</div>
		</div>
		<!-- Field: Amount received -->
		<div class="form-group enrollment-amount_received" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Amount received</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(amount_received)%%></div>
			</div>
		</div>
		<!-- Field: Balance -->
		<div class="form-group enrollment-balance" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Balance</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(balance)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
