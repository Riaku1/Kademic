<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: ID -->
		<div class="form-group fees_payments-id" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">ID</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(id)%%></div>
			</div>
		</div>
		<!-- Field: Date -->
		<div class="form-group fees_payments-date" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(date)%%></div>
			</div>
		</div>
		<!-- Field: Student name -->
		<div class="form-group fees_payments-student" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Student name</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="student<%%RND1%%>"><%%COMBOTEXT(student)%%></span></div>
			</div>
		</div>
		<!-- Field: Class -->
		<div class="form-group fees_payments-class" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Class</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="class<%%RND1%%>"></span></div>
			</div>
		</div>
		<!-- Field: Term -->
		<div class="form-group fees_payments-term" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Term</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="term<%%RND1%%>"></span></div>
			</div>
		</div>
		<!-- Field: Amount received -->
		<div class="form-group fees_payments-amount_received" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Amount received</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(amount_received)%%></div>
			</div>
		</div>
		<!-- Field: Received from -->
		<div class="form-group fees_payments-received_from" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Received from</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(received_from)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
