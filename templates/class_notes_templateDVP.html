<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: ID -->
		<div class="form-group class_notes-id" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">ID</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(id)%%></div>
			</div>
		</div>
		<!-- Field: Subject -->
		<div class="form-group class_notes-subject" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Subject</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="subject<%%RND1%%>"><%%COMBOTEXT(subject)%%></span></div>
			</div>
		</div>
		<!-- Field: Class -->
		<div class="form-group class_notes-class" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Class</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="class<%%RND1%%>"><%%COMBOTEXT(class)%%></span></div>
			</div>
		</div>
		<!-- Field: Term -->
		<div class="form-group class_notes-term" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Term</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(term)%%></div>
			</div>
		</div>
		<!-- Field: Topics -->
		<div class="form-group class_notes-topics" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Topics</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(topics)%%></div>
			</div>
		</div>
		<!-- Field: Resource -->
		<div class="form-group class_notes-resource" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Resource</label>
			<div class="col-xs-9">
				<div class="form-control-static"><a id="resource-link" href="link.php?t=class_notes&f=resource&i=<%%VALUE(id)%%>" target="_blank"><i class="glyphicon glyphicon-lg glyphicon-download-alt" title="<%%VALUE(resource)%%>"></i></a><script>jQuery(function() { var e_resource = '<%%VALUE(resource)%%>'; if(e_resource == '' || e_resource == '&nbsp;' || e_resource == 'blank.gif') jQuery('#resource-link').hide(); });</script></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
